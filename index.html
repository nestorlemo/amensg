/* ---------- Reveal (scroll, duration-700 ease-out, delay por item) ---------- */
function Reveal({ children, className = "", delay = 0 }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { setShown(true); io.disconnect(); } });
    }, { threshold: 0.12 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ transitionDelay: `${delay}ms` }} className={`reveal ${shown ? "shown" : ""} ${className}`}>
      {children}
    </div>
  );
}

}

const EN = ["Documentación","Equipo enviado","En reparto","Pendiente","Entregado"];
const ST = [["ok","Activo"],["pr","Proceso"],["wt","En cola"]];
const R = (a) => a[Math.floor(Math.random()*a.length)];

function DynamicMockup() {
  const [tabIdx, setTabIdx] = useState(0);

  const [cycleKey, setCycleKey] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [reduced, setReduced] = useState(false);

  useEffect(() => {
    if (typeof window === "undefined" || !window.matchMedia) return;
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    const update = () => { setReduced(mq.matches); if (mq.matches) setPlaying(false); };
    update();
    mq.addEventListener && mq.addEventListener("change", update);
    return () => mq.removeEventListener && mq.removeEventListener("change", update);
  }, []);

  const playingRef = useRef(playing); playingRef.current = playing;

  const handleCycleComplete = useCallback(() => {
    if (!playingRef.current) return;
    setTabIdx((i) => {
      if (MK_ORDER[i].scene === 3) setIntegrationPairIdx((p) => (p + 1) % 2);
      return (i + 1) % MK_ORDER.length;

    setCycleKey((k) => k + 1);

  const goToTab = (i) => { const n = ((i % MK_ORDER.length) + MK_ORDER.length) % MK_ORDER.length; setTabIdx(n); setCycleKey((k) => k + 1); };
  const prev = () => goToTab(tabIdx - 1);
  const next = () => goToTab(tabIdx + 1);

  const cur = MK_ORDER[tabIdx].scene;
  const [badgeCls, badgeTxt] = MK_BADGES[cur];

        <div className="flex h-[38px] items-center gap-1.5 border-b border-white/5 bg-[#0a1626] px-3.5">
          <span className="h-[11px] w-[11px] rounded-full bg-[#ff5f57]"/>
          <span className="h-[11px] w-[11px] rounded-full bg-[#febc2e]"/>
          <span className="h-[11px] w-[11px] rounded-full bg-[#28c840]"/>
          <span className="ml-3 font-mono text-[11.5px] text-[#8ba3c7] truncate">{MK_TABS[cur]}</span>
          <span className={`ml-auto inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[9.5px] font-semibold tracking-[1px] ${badgeCls === "cy" ? "bg-[#19C3FF]/10 text-[#19C3FF]" : "bg-[#20E0B2]/10 text-[#20E0B2]"}`}>
            <span className={`h-1.5 w-1.5 rounded-full animate-pulse ${badgeCls === "cy" ? "bg-[#19C3FF]" : "bg-[#20E0B2]"}`}/>
            {badgeTxt}
          </span>
        </div>
        <div className="relative h-[calc(100%-38px)]">
          {cur === 0 && <WorkflowScene key={sceneKey} onCycleComplete={handleCycleComplete} reduced={reduced}/>}
          {cur === 1 && <ChatScene key={sceneKey} onCycleComplete={handleCycleComplete} reduced={reduced}/>}
          {cur === 2 && <AppScene key={sceneKey} onCycleComplete={handleCycleComplete} reduced={reduced}/>}
          {cur === 3 && <IntegrationScene key={sceneKey} onCycleComplete={handleCycleComplete} reduced={reduced} pairIdx={integrationPairIdx}/>}

        <button onClick={prev} aria-label="Escena anterior" className="flex h-8 w-8 items-center justify-center rounded-lg border border-white/10 bg-white/[0.04] text-[#aebfd6] hover:text-white hover:border-white/20 transition-all">
          <svg viewBox="0 0 24 24" className="h-3.5 w-3.5" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button onClick={() => setPlaying((p) => !p)} aria-label={playing ? "Pausar" : "Reproducir"} className="flex h-8 w-8 items-center justify-center rounded-lg border border-[#19C3FF]/30 bg-[#19C3FF]/10 text-[#19C3FF] hover:bg-[#19C3FF]/15 transition-all">
          {playing ? (

          ) : (

/* ── Escena Workflow (n8n horizontal) — paso cada 850ms ── */
function WorkflowScene({ onCycleComplete, reduced }) {
  const [step, setStep] = useState(0);
  const order = ["w0","w1","w2","w3","w5"];
  const doneRef = useRef(false);
  useEffect(() => {
    if (reduced) { setStep(order.length); onCycleComplete && onCycleComplete(); return; }
    let s = 0; setStep(0); doneRef.current = false;
    const total = order.length + 2;
    const id = setInterval(() => {
      s += 1;
      if (s >= total) { clearInterval(id); setStep(order.length); if (!doneRef.current) { doneRef.current = true; onCycleComplete && onCycleComplete(); } return; }
      setStep(s);
    }, 850);
    return () => clearInterval(id);
  }, [onCycleComplete, reduced]);

  const nodeState = (i) => { if (step > order.length) return i < order.length ? "done" : ""; if (i < step) return "done"; if (i === step) return "active"; return ""; };
  const nodes = [
    { id:"w0", x:30,  y:96,  icon:"⚡",  label:"Webhook\nentrada" },
    { id:"w1", x:135, y:96,  icon:"⚙",  label:"Validar\ndatos" },
    { id:"w2", x:240, y:96,  icon:"◇",  label:"Agente\nIA" },
    { id:"w3", x:345, y:41,  icon:"{ }",label:"Procesar\nrespuesta" },
    { id:"w4", x:345, y:161, icon:"↻",  label:"Reintentar" },
    { id:"w5", x:520, y:96,  icon:"↗",  label:"Integrar\nsistema" },
  ];
  const litEdges = step;
  const CW = 620, CH = 270;
  const X = (px) => `${((px/CW)*100).toFixed(3)}%`;
  const Y = (py) => `${((py/CH)*100).toFixed(3)}%`;
  const W = (w) => `${((w/CW)*100).toFixed(3)}%`;
  const paths = [
    "M 96 123 C 120 123, 150 123, 147 123",
    "M 201 123 C 225 123, 255 123, 252 123",
    "M 306 123 C 335 123, 355 68, 357 68",
    "M 306 123 C 335 123, 355 188, 357 188",
    "M 411 68 C 470 68, 500 123, 532 123",
    "M 411 188 C 470 188, 500 123, 532 123",
  ];

  return (
    <div className="flex h-full items-center justify-center px-3">
      <div className="relative w-full max-w-[620px]" style={{ aspectRatio: `${CW} / ${CH}` }}>
        <svg className="absolute inset-0 h-full w-full pointer-events-none" viewBox={`0 0 ${CW} ${CH}`} preserveAspectRatio="none">
          {paths.map((d, i) => <path key={i} d={d} stroke="rgba(255,255,255,0.13)" strokeWidth="1.8" fill="none" vectorEffect="non-scaling-stroke"/>)}
          {[paths[0],paths[1],paths[2],paths[4]].map((d, i) => (
            <path key={`l${i}`} d={d} stroke="#19C3FF" strokeWidth="1.8" fill="none" vectorEffect="non-scaling-stroke" style={{ opacity: i < litEdges ? 1 : 0, transition: "opacity 0.6s ease" }}/>
          ))}
        </svg>
        {nodes.map((n) => {
          const idx = order.indexOf(n.id);
          const state = idx >= 0 ? nodeState(idx) : (step >= 4 ? "active" : "");
          const visible = idx >= 0 ? step >= idx : step >= 4;
          const isActive = state === "active", isDone = state === "done", isAgent = n.id === "w2";
          return (
            <div key={n.id} className="absolute transition-all duration-300" style={{ left: X(n.x), top: Y(n.y), width: W(78), opacity: visible ? 1 : 0, transform: visible ? "scale(1)" : "scale(0.8)" }}>
              <div className={`relative mx-auto flex h-[54px] w-[54px] items-center justify-center rounded-[13px] border transition-all ${isAgent ? "text-[18px]" : "text-[21px]"} ${
                isActive ? "border-[#19C3FF] bg-[#19C3FF]/12 text-[#19C3FF] shadow-[0_0_22px_-4px_rgba(25,195,255,0.5)]"
                : isDone ? "border-[#20E0B2]/45 bg-white/5 text-[#20E0B2]"
                : isAgent ? "border-[#a78bfa]/40 bg-[#a78bfa]/8 text-[#c4b5fd]"
                : "border-white/12 bg-white/5 text-[#cfe4f7]"}`}>
                {isAgent ? (<>
                  <svg viewBox="0 0 24 24" className="h-6 w-6" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="4" y="8" width="16" height="11" rx="2.5"/><path d="M12 3v5"/><circle cx="12" cy="3" r="1.2" fill="currentColor"/><circle cx="9" cy="13" r="1.1" fill="currentColor"/><circle cx="15" cy="13" r="1.1" fill="currentColor"/><path d="M9 16.5h6"/>
                  </svg>
                  <span className="absolute -top-1.5 -right-1.5 rounded-[5px] bg-[#a78bfa] px-1 py-[1px] text-[7px] font-bold text-[#1a0f2e] leading-none">AI</span>
                </>) : n.icon}
              </div>
              <div className="mt-1.5 text-center text-[9.5px] font-medium leading-tight text-[#aebfd6] whitespace-pre-line">{n.label}</div>

          <div className="mt-0.5 text-center text-[8px] text-[#7088a8]">OpenAI</div>
        </div>
      </div>
    </div>
  );
}

/* ── Escena Chat — typing 600ms, pausas 600/700ms, hold 1200ms ── */
function ChatScene({ onCycleComplete, reduced }) {
  const [msgs, setMsgs] = useState([]);
  const iRef = useRef(0);
  useEffect(() => {
    iRef.current = 0; setMsgs([]);
    if (reduced) { onCycleComplete && onCycleComplete(); return; }
    let cancelled = false, done = false;
    const timeouts = [];
    const finish = () => { if (done || cancelled) return; done = true; onCycleComplete && onCycleComplete(); };
    const next = () => {
      if (cancelled) return;
      if (iRef.current >= CONVO.length) { timeouts.push(setTimeout(finish, 1200)); return; }
      const [w, t] = CONVO[iRef.current];
      if (w === "ai") {
        setMsgs((m) => [...m, { w, t: "", typing: true }].slice(-4));
        timeouts.push(setTimeout(() => {
          setMsgs((m) => { const c = [...m]; const last = c[c.length-1]; if (last && last.typing) c[c.length-1] = { w, t }; return c; });
          iRef.current++; timeouts.push(setTimeout(next, 700));
        }, 600));
      } else {
        setMsgs((m) => [...m, { w, t }].slice(-4));
        iRef.current++; timeouts.push(setTimeout(next, 600));
      }
    };
    next();
    return () => { cancelled = true; timeouts.forEach(clearTimeout); };
  }, []);

  return (
    <div className="flex h-full flex-col gap-2.5 p-5">
      {msgs.map((m, i) => (
        <div key={i} className={`flex gap-2.5 items-start ${m.w === "u" ? "flex-row-reverse" : ""}`} style={{ animation: "fadeUp 0.4s ease both" }}>
          <div className={`flex h-[30px] w-[30px] shrink-0 items-center justify-center rounded-[9px] text-sm ${m.w === "ai" ? "bg-[#19C3FF]/12 border border-[#19C3FF]/25 text-[#19C3FF]" : "bg-white/[0.06] border border-white/12 text-[#aebfd6]"}`}>
            {m.w === "ai" ? "◇" : "◍"}
          </div>
          <div className={`max-w-[78%] rounded-[11px] px-3 py-2 text-[12px] leading-snug ${m.w === "ai" ? "bg-[#19C3FF]/10 border border-[#19C3FF]/16 text-[#cfeeff]" : "bg-white/[0.05] border border-white/10 text-[#e6eefc]"}`}>
            {m.typing ? (
              <span className="inline-flex gap-0.5">
                <span className="h-1.5 w-1.5 rounded-full bg-[#19C3FF] animate-pulse"/>
                <span className="h-1.5 w-1.5 rounded-full bg-[#19C3FF] animate-pulse" style={{ animationDelay: "0.2s" }}/>
                <span className="h-1.5 w-1.5 rounded-full bg-[#19C3FF] animate-pulse" style={{ animationDelay: "0.4s" }}/>
              </span>
            ) : m.t}
          </div>
        </div>
      ))}
    </div>
  );
}

/* 5. CASO DESTACADO (con flujo operativo animado, paso cada 700ms en loop) */
function CasoDestacado() {
  const metrics = [
    { n: "200–300", l: "usuarios" },
    { n: "4", l: "empresas" },
    { n: "4", l: "call centers" },
    { n: "13+", l: "años en producción" },
  ];
  const flow = [
    { icon: IcoHeadphones, label: "Call Center" },
    { icon: IcoCart, label: "Venta" },
    { icon: IcoBuilding, label: "Backoffice" },
    { icon: IcoTruck, label: "Distribución" },
    { icon: IcoMapPinned, label: "Cadete" },
    { icon: IcoUsers, label: "Cliente" },
  ];
  const [lit, setLit] = useState(-1);
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    let interval;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let i = 0;
        interval = setInterval(() => { setLit(i); i++; if (i > flow.length + 2) i = 0; }, 700);
        io.disconnect();
      }
    }, { threshold: 0.3 });
    io.observe(ref.current);
    return () => { io.disconnect(); if (interval) clearInterval(interval); };
  }, []);
  return (
    <section id="caso" className="bg-[#06101F] py-24 md:py-32">
      <div className="mx-auto max-w-7xl px-5 md:px-8">
        <Reveal>
          <Eyebrow>Caso destacado</Eyebrow>
          <h2 className="mt-3 max-w-4xl font-extrabold tracking-[-0.025em] text-white" style={{ fontSize: "clamp(30px,4vw,48px)" }}>Plataforma central de gestión comercial y operativa.</h2>
          <p className="mt-5 max-w-3xl text-[16px] leading-relaxed text-white/65">Una solución empresarial en producción real, utilizada por cientos de usuarios y conectada con procesos críticos del negocio.</p>
        </Reveal>
        <Reveal delay={80}>
          <div className="mt-12 rounded-2xl border border-white/10 bg-white/[0.03] p-8 md:p-12 backdrop-blur-sm">
            <p className="max-w-4xl text-[15.5px] leading-relaxed text-white/70">
              AMENSG desarrolló y mantiene una aplicación central de gestión utilizada por entre <strong className="text-white">200 y 300 usuarios</strong>, distribuidos en <strong className="text-white">4 empresas</strong>, cada una con su propio call center. La plataforma soporta procesos críticos de ventas, backoffice, distribución, gestión de puntos de venta y entregas en campo mediante una web móvil utilizada por cadetes.
            </p>
            <div className="mt-10 grid grid-cols-2 gap-y-8 border-y border-white/10 py-8 md:grid-cols-4">
              {metrics.map((m) => (
                <div key={m.l}>
                  <div className="font-extrabold tracking-[-0.03em] text-white" style={{ fontSize: "clamp(30px,3.4vw,46px)" }}>{m.n}</div>
                  <div className="mt-1 text-[11px] font-semibold uppercase tracking-[1.4px] text-[#7088a8]">{m.l}</div>
                </div>
              ))}
            </div>
            <div ref={ref} className="mt-12">
              <div className="text-[11px] font-semibold uppercase tracking-[1.6px] text-[#19C3FF]">Flujo operativo</div>
              <div className="mt-5 grid grid-cols-2 gap-y-6 sm:grid-cols-3 lg:grid-cols-6 lg:gap-x-2">
                {flow.map((f, i) => {
                  const active = lit === i;
                  const done = lit > i && lit <= flow.length;
                  return (
                    <div key={f.label} className="relative flex flex-col items-center text-center">
                      <div className={`flex h-14 w-14 items-center justify-center rounded-2xl border transition-all duration-500 ${active ? "border-[#19C3FF] bg-[#19C3FF]/12 text-[#19C3FF] shadow-[0_0_28px_-4px_rgba(25,195,255,0.6)] scale-105" : done ? "border-[#20E0B2]/40 bg-white/5 text-[#20E0B2]" : "border-white/12 bg-white/5 text-white/55"}`}>
                        <f.icon size={24} sw={1.6}/>
                      </div>
                      <span className="mt-3 text-[12px] font-semibold text-white/80">{f.label}</span>
                      {i < flow.length - 1 && <div aria-hidden className="absolute right-[-8px] top-7 hidden h-px w-4 bg-gradient-to-r from-[#19C3FF]/40 to-[#19C3FF]/0 lg:block"/>}
                    </div>
                  );
                })}
              </div>
            </div>
            <p className="mt-12 max-w-3xl text-[15px] italic leading-relaxed text-white/55">Este caso refleja nuestra capacidad de construir, mantener y evolucionar soluciones críticas que conectan personas, procesos y sistemas en la operación diaria.</p>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* 10. CONTACTO */
function ContactBlock() {
  const [f, setF] = useState({ nombre: "", empresa: "", email: "", telefono: "", proceso: "", mensaje: "" });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);
  const validate = () => {
    const e = {};
    if (f.nombre.trim().length < 2) e.nombre = "Ingresá tu nombre.";
    if (f.empresa.trim().length < 1) e.empresa = "Ingresá tu empresa.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.email = "Email inválido.";
    if (f.mensaje.trim().length < 10) e.mensaje = "Contanos brevemente tu caso.";
    return e;
  };
  const submit = (ev) => {
    ev.preventDefault();
    const e = validate(); setErrors(e);
    if (Object.keys(e).length === 0) { setSent(true); setF({ nombre: "", empresa: "", email: "", telefono: "", proceso: "", mensaje: "" }); }
  };
  const inp = "w-full h-11 rounded-lg border border-white/10 bg-white/[0.04] px-4 text-sm text-white placeholder:text-white/40 focus:outline-none focus:border-[#19C3FF] focus:ring-2 focus:ring-[#19C3FF]/30 transition";
  const lbl = "block text-[11px] font-semibold uppercase tracking-[1.2px] text-white/60 mb-1.5";
  return (
    <div className="grid gap-12 lg:grid-cols-5 lg:gap-16">
      <form onSubmit={submit} className="space-y-4 lg:col-span-3" noValidate>
        <div className="grid gap-4 sm:grid-cols-2">
          <label className="block"><span className={lbl}>Nombre</span><input className={inp} value={f.nombre} onChange={(e) => setF({ ...f, nombre: e.target.value })} placeholder="Tu nombre"/>{errors.nombre && <span className="mt-1 block text-xs text-red-400">{errors.nombre}</span>}</label>
          <label className="block"><span className={lbl}>Empresa</span><input className={inp} value={f.empresa} onChange={(e) => setF({ ...f, empresa: e.target.value })} placeholder="Tu empresa"/>{errors.empresa && <span className="mt-1 block text-xs text-red-400">{errors.empresa}</span>}</label>
          <label className="block"><span className={lbl}>Email</span><input type="email" className={inp} value={f.email} onChange={(e) => setF({ ...f, email: e.target.value })} placeholder="nombre@empresa.com"/>{errors.email && <span className="mt-1 block text-xs text-red-400">{errors.email}</span>}</label>
          <label className="block"><span className={lbl}>Teléfono</span><input className={inp} value={f.telefono} onChange={(e) => setF({ ...f, telefono: e.target.value })} placeholder="Opcional"/></label>
        </div>
        <label className="block"><span className={lbl}>¿Qué proceso te gustaría mejorar?</span><input className={inp} value={f.proceso} onChange={(e) => setF({ ...f, proceso: e.target.value })} placeholder="Ej: gestión de ventas, integración entre sistemas, agente de soporte…"/></label>
        <label className="block"><span className={lbl}>Mensaje</span><textarea rows={5} className={`${inp} h-auto py-3 resize-y`} value={f.mensaje} onChange={(e) => setF({ ...f, mensaje: e.target.value })} placeholder="Contanos el proceso, sistemas involucrados y qué te gustaría mejorar."/>{errors.mensaje && <span className="mt-1 block text-xs text-red-400">{errors.mensaje}</span>}</label>
        <button type="submit" className="inline-flex h-12 items-center gap-2 rounded-full px-6 text-sm font-semibold text-white shadow-[0_10px_30px_-10px_rgba(25,195,255,0.6)] hover:-translate-y-0.5 transition-transform" style={{ background: "linear-gradient(135deg,#0B1F3A 0%, #1769E0 100%)" }}>Agendar diagnóstico de automatización</button>
        {sent && <div className="flex items-start gap-2 rounded-lg border border-[#20E0B2]/40 bg-[#20E0B2]/10 px-4 py-3 text-sm text-white"><IcoCheck size={16} className="mt-0.5 text-[#20E0B2]"/>Gracias. Recibimos tu mensaje y te respondemos a la brevedad.</div>}
        {!sent && Object.keys(errors).length > 0 && <div className="flex items-start gap-2 rounded-lg border border-red-500/30 bg-red-500/5 px-4 py-3 text-xs text-white/70"><IcoAlertC size={16} className="mt-0.5 text-red-400"/>Revisá los campos marcados.</div>}
      </form>
      <div className="space-y-6 lg:col-span-2">
        <div>
          <h3 className="text-2xl font-bold tracking-tight text-white">Hablemos.</h3>
          <p className="mt-3 text-[15px] leading-relaxed text-white/65">Coordinemos una primera conversación para analizar procesos, sistemas involucrados y oportunidades concretas de automatización e IA.</p>
        </div>
        <div className="space-y-3">
          <a href="mailto:contacto@amensg.com" className="flex items-center gap-3 rounded-xl border border-white/10 bg-white/[0.03] px-5 py-4 hover:border-[#19C3FF]/40 transition-colors"><IcoMail size={20} className="text-[#19C3FF]"/><span className="text-sm text-white">contacto@amensg.com</span></a>
          <div className="flex items-center gap-3 rounded-xl border border-white/10 bg-white/[0.03] px-5 py-4"><IcoMapPin size={20} className="text-white/60"/><span className="text-sm text-white/80">Montevideo, Uruguay</span></div>
        </div>
      </div>
    </div>
  );
}

}
