version: '3.9'
services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: [.env]
    depends_on: [postgres]
    command: npm run dev
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
